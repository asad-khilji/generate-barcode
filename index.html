<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcode Generator</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;padding-top:50px}
.box{background:#fff;padding:20px;border-radius:10px;display:inline-block}
input,button{padding:10px;margin:5px;width:250px}
</style>
</head>
<body>

<div class="box">
<h2>Barcode Generator</h2>

<input id="upc" placeholder="12 digit UPC">
<input id="sku" placeholder="SKU">

<br>
<button id="gen">Generate</button>
<button id="print">Print</button>

<br>
<svg id="barcode"></svg>
<div id="skuText"></div>
</div>

<script>
document.getElementById("gen").onclick = function() {
  var upc = document.getElementById("upc").value;
  var sku = document.getElementById("sku").value;

  if(upc.length !== 13 || isNaN(upc)){
    alert("Enter valid 12 digit UPC");
    return;
  }

  JsBarcode("#barcode", upc);
  document.getElementById("skuText").innerText = "SKU: " + sku;
};

document.getElementById("print").onclick = function(){
  window.print();
};
</script>

</body>
</html>
